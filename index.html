<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Priorly - AI To-Do List</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- PAGE 0: Landing -->
  <div class="container" id="landingSection">
    <h1><span class="bounce">🧠</span> Priorly</h1>
    <p class="subtitle">An AI-driven task manager that keeps you on track</p>
    <button id="letsStartBtn">Let's Start</button>
  </div>

  <!-- PAGE 1: Add tasks -->
  <div class="container hidden" id="setupSection">
    <h1>📝 Make My List</h1>
    <p class="subtitle">Add tasks with a start and end time</p>

    <input type="text" id="taskInput" placeholder="Task name...">
    <div class="time-row">
      <div>
        <label>Start</label>
        <input type="time" id="startTimeInput">
      </div>
      <div>
        <label>End</label>
        <input type="time" id="endTimeInput">
      </div>
    </div>
    <button id="addBtn">Add Task</button>
    <button id="arrangeBtn">🔀 Arrange Tasks</button>

    <ul id="taskList"></ul>

    <button id="startDayBtn">🚀 Start My Day</button>
  </div>

  <!-- PAGE 2: Current task -->
  <div class="container hidden" id="planSection">
    <h1>📍 Current Task</h1>
    <div id="currentTaskBox">
      <p id="currentTaskName">—</p>
      <p id="currentTaskTime"></p>
      <p id="currentTaskStatus"></p>
    </div>
    <p id="taskCounter"></p>
    <button id="backBtn">⬅ Go Back</button>
  </div>

  <!-- PAGE 3: Warning -->
  <div class="container hidden" id="warningSection">
    <p class="warning-text">⚠ STAY AND COMPLETE THE TASK</p>
    <button id="okBackBtn" class="blue-btn">OK, Go Back to Task</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
